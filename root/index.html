<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/styles.css" />
    <title>GIFOS</title>
  </head>
  <body>
    <header class="Header">
      <nav class="Header-navbar">
        <div class="Header-navbar-logo-container">
          <img
            src="assets/logo-mobile.svg"
            alt="logo"
            class="Header-navbar-logo-img"
          />
        </div>
        <div class="Header-navbar-menu">
          <button class="Header-navbar-menu-button">
            <img
              src="assets/burger.svg"
              alt="boton menu"
              class="Header-navbar-menu-icon"
              aria-label="menu de navegacion"
            />
          </button>
          <ul class="Header-navbar-menu-list">
            <li class="Header-navbar-menu-item"><a href="">Modo nocturno</a></li>
            <li class="Header-navbar-menu-item"><a href="">Favoritos</a></li>
            <li class="Header-navbar-menu-item"><a href="">Mis gifos</a></li>
          </ul>
        </div>
      </nav>
    </header>
    <main class="Main">
      <section class="Search">
        <h1 class="Search-title">
          Insp&#237;rate, busca,
          <span class="Search-title-newLine">guarda, y crea los </span>
          <span class="Search-title-newLine"
            >mejores <span class="Search-title-highlight">GIFOS</span></span
          >
        </h1>
        <img
          src="assets/ilustra_header.svg"
          alt="ilustracion"
          class="Search-img"
        />
        <div class="Search-searchBar">
          <label for="searchbar">
            <input 
              type="text" 
              name="searchbar" 
              placeholder="Busca GIFOS y mas" 
              class="Search-searchBar-input" 
            />
          </label>
          <img
            src="assets/icon-search.svg"
            alt="gifos illustration"
            class="Search-searchBar-img"
          />
        </div>
        <div class="Search-trending">
          <h4 class="Search-trending-title">Trending</h4>
          <div class="Search-trending-topics"></div>
        </div>
      </section>
      <section class="Favourites">
        <div class="Favourites-logo-container">
          <img
            src="assets/icon-favoritos.svg"
            alt="Favoritos"
            class="Favourites-logo-img"
          />
        </div>
        <h3 class="Favourites-title">Favoritos</h3>
        <div class="Favourites-gifsWrapper">
          <div class="Favourites-gifsWrapper-gifContainer">
            <img
              src=""
              alt="Nahh"
              class="Favourites-gifsWrapper-gifContainer"
            />
          </div>
        </div>
        <button class="Favourites-button">Ver Mas</button>
      <section class="Trending">
        <h2 class="Trending-title">Trending GIFOS</h2>
        <div class="Trending-introduction"></div>
        <div class="Trending-carousel">
          <div class="Trending-carousel-item"></div>
          <div class="Trending-carousel-item"></div>
          <div class="Trending-carousel-item"></div>
          <div class="Trending-carousel-item"></div>
        </div>
      </section>
    </main>
    <footer class="Footer">
      <div class="Footer-social">
        <span class="Footer-social-text">Compartir en:</span
        ><!--Cambiar : por html entity-->
        <img
          src="assets/icon_facebook.svg"
          alt="facebook"
          class="Footer-social-icon"
        /><img
          src="assets/icon-twitter.svg"
          alt="twitter"
          class="Footer-social-icon"
        /><img
          src="assets/icon_instagram.svg"
          alt=""
          class="Footer-social-icon"
        />
      </div>
      <div class="Footer-copyright">&copy; GIFOS 2021. All rights reserved.</div>
    </footer>
    <script src="/scripts/app.js"></script>
  </body>
</html>
